<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Woodcraft</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="img/favicon.ico" rel="icon">
    <!-- Bootstrap -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<section class="login-page">
    <div class="login-container">
        <div class="login-box">

            <!-- Logo -->
            <div class="text-center mb-3">
                <a href="index.html">
                    <img src="img/woodcraft-logo.png" class="register-logo" alt="Woodcraft Logo">
                </a>
            </div>

            <h2 class="text-center mb-4">Create Your Account</h2>

            <form>

                <div class="mb-3">
                    <input type="text" class="form-control login-input" placeholder="Full Name">
                </div>

                <div class="mb-3">
                    <input type="email" class="form-control login-input" placeholder="Email Address">
                </div>

                <div class="mb-3">
                    <input type="password" class="form-control login-input" placeholder="Password">
                </div>

                <div class="mb-3">
                    <input type="password" class="form-control login-input" placeholder="Confirm Password">
                </div>

                <button type="submit" class="login-btn w-100">Register</button>

                <div class="text-center mt-4 dont-btn">
                    <small>Already have an account? 
                        <a href="login.html">Login</a>
                    </small>
                </div>

            </form>

        </div>
    </div>
</section>

</body>
</html>
