<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Woodcraft</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="img/favicon.ico" rel="icon">
    <!-- Bootstrap -->
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<section class="login-page">
    <div class="login-container">
        <div class="login-box">
             <a href="index.html" class="navbar-brand d-flex align-items-center px-4 px-lg-5">
            <img src="img/woodcraft-logo.png">
        </a>

            <h2 class="text-center mb-4">Login to Woodcraft</h2>

            <form>
                <div class="mb-3">
                    <input type="email" class="form-control login-input" placeholder="Email Address">
                </div>

                <div class="mb-3">
    
    <input type="password" class="form-control login-input" placeholder="Enter your password">
    <a href="#" class="forgot-outside">Forgot Password?</a>
</div>


                <button type="submit" class="login-btn w-100">Login</button>

                <div class="text-center mt-4">
                    <p class="mb-3">Or login with</p>

                    <button type="button" class="social-btn google-btn w-100 mb-2">
                        <i class="fab fa-google me-2"></i> Continue with Google
                    </button>

                    <button type="button" class="social-btn facebook-btn w-100">
                        <i class="fab fa-facebook-f me-2"></i> Continue with Facebook
                    </button>
                </div>

                <div class="text-center mt-4 dont-btn">
                    <small>Don't have an account? <a href="register.html">Register</a></small>
                </div>
            </form>

        </div>
    </div>
</section>

</body>
</html>
